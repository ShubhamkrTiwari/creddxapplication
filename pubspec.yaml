name: creddx
description: "CreddX  Crypto Exchange"
publish_to: 'none'

version: 3.4.2+31

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  fl_chart: ^0.68.0
  syncfusion_flutter_charts: ^33.1.46
  intl: ^0.20.2
  http: ^1.2.2
  flutter_launcher_icons: ^0.13.1
  gif: ^2.3.0
  shared_preferences: ^2.2.2
  device_info_plus: ^10.1.0
  web_socket_channel: ^2.4.5
  socket_io_client: ^2.0.3
  mobile_scanner: ^6.0.2
  permission_handler: ^11.4.0
  share_plus: ^7.2.2
  path_provider: ^2.1.2
  local_auth: ^2.2.0
  qr_flutter: ^4.1.0
  image_picker: ^1.1.2
  webview_flutter: ^4.8.0
  url_launcher: ^6.2.5
  android_intent_plus: ^5.3.1
  package_info_plus: ^8.3.1
  app_links: ^6.3.2
  upgrader: ^13.1.0
  
  # Play Store optimization dependencies
  # Remove device_preview for production builds
  # Use only one webview implementation to reduce APK size
  # flutter_inappwebview removed in favor of webview_flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Add for app size analysis
  flutter_driver:
    sdk: flutter
  test: ^1.24.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  image_path: "assets/images/appicon.png"
  android: true
  ios: true
